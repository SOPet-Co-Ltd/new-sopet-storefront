# SOPET Storefront — Deploy to Vercel via Deploy Hook
# Triggers on push to main (production) or uat.
# Configure VERCEL_DEPLOY_HOOK_URL in GitHub Environment secrets:
#   production → main branch hook
#   uat        → uat branch hook

name: Deploy

on:
  push:
    branches: [main, uat]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'uat' }}

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL is not set for environment '${{ github.ref_name == 'main' && 'production' || 'uat' }}'"
            exit 1
          fi
          echo "Triggering Vercel deployment for branch ${{ github.ref_name }}..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Deploy hook triggered successfully."
