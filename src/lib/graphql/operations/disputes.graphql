fragment DisputeFields on DisputeType {
  id
  orderId
  reason
  issueType
  status
  createdAt
  updatedAt
  messages {
    id
    senderType
    message
    attachments
    createdAt
  }
  images {
    id
    imageUrl
    sortOrder
  }
}

query MyDisputes {
  myDisputes {
    ...DisputeFields
  }
}

mutation CreateDispute($input: CreateDisputeInput!) {
  createDispute(input: $input) {
    ...DisputeFields
  }
}
