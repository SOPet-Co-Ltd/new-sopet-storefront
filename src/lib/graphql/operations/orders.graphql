fragment OrderListFields on OrderType {
  id
  orderNumber
  status
  createdAt
  total
  items {
    id
    productName
    quantity
  }
}

fragment OrderConfirmationFields on OrderType {
  id
  orderNumber
  status
  createdAt
  subtotal
  shippingFee
  discountAmount
  total
  paymentMethod
  items {
    id
    variantId
    storeId
    productName
    productId
    productImageUrl
    unitPrice
    quantity
    subtotal
    fulfillmentStatus
    trackingNumber
    fulfillmentProvider
    trackingUrl
  }
  storeShippings {
    storeId
    optionName
    shippingFee
  }
}

query Orders($page: Int, $limit: Int, $filter: CustomerOrderListFilter) {
  orders(page: $page, limit: $limit, filter: $filter) {
    items {
      ...OrderListFields
    }
    pagination {
      page
      limit
      total
      totalPages
    }
  }
}

query Order($id: String!) {
  order(id: $id) {
    ...OrderConfirmationFields
  }
}

mutation ConfirmOrderDelivered($input: ConfirmOrderDeliveredInput!) {
  confirmOrderDelivered(input: $input) {
    ...OrderConfirmationFields
  }
}
