fragment OrderConfirmationFields on OrderType {
  id
  orderNumber
  status
  createdAt
  subtotal
  shippingFee
  discountAmount
  total
  paymentMethod
  items {
    id
    variantId
    storeId
    productName
    unitPrice
    quantity
    subtotal
    fulfillmentStatus
    trackingNumber
    fulfillmentProvider
    trackingUrl
  }
  storeShippings {
    storeId
    optionName
    shippingFee
  }
}

query Orders {
  orders {
    ...OrderConfirmationFields
  }
}

query Order($id: String!) {
  order(id: $id) {
    ...OrderConfirmationFields
  }
}

mutation ConfirmOrderDelivered($input: ConfirmOrderDeliveredInput!) {
  confirmOrderDelivered(input: $input) {
    ...OrderConfirmationFields
  }
}
