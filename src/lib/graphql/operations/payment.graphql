fragment PaymentFields on PaymentType {
  id
  orderId
  amount
  currency
  status
  paymentMethod
  authorizeUri
  qrCodeUrl
  expiresAt
}

query Payment($id: String!) {
  payment(id: $id) {
    ...PaymentFields
  }
}

query PaymentByOrderId($orderId: String!) {
  paymentByOrderId(orderId: $orderId) {
    ...PaymentFields
  }
}

subscription PaymentStatusUpdated($paymentId: String, $orderId: String) {
  paymentStatusUpdated(paymentId: $paymentId, orderId: $orderId) {
    ...PaymentFields
  }
}
