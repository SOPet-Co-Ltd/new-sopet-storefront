fragment ProductDetailFields on ProductType {
  id
  slug
  storeId
  name
  description
  basePrice
  compareAtPrice
  thumbnailUrl
  averageRating
  reviewCount
  soldCount
  status
  category
  tags
  warning
  store {
    id
    name
    slug
    logoUrl
    bannerUrl
    description
  }
  images {
    id
    imageUrl
    isThumbnail
    sortOrder
  }
  variants {
    id
    sku
    price
    stockQuantity
    optionsJson
  }
}

query ProductBySlug($slug: String!, $storeId: String!) {
  productBySlug(slug: $slug, storeId: $storeId) {
    ...ProductDetailFields
  }
}

query ProductById($id: String!) {
  product(id: $id) {
    ...ProductDetailFields
  }
}
