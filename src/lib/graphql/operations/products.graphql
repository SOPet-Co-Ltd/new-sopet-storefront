fragment ProductCardFields on ProductType {
  id
  name
  slug
  storeId
  basePrice
  compareAtPrice
  thumbnailUrl
  averageRating
  reviewCount
  soldCount
}

query Products(
  $category: String
  $page: Int
  $limit: Int
  $search: String
  $storeId: String
  $tag: String
) {
  products(
    category: $category
    page: $page
    limit: $limit
    search: $search
    storeId: $storeId
    tag: $tag
  ) {
    items {
      ...ProductCardFields
      store {
        id
        name
        slug
      }
    }
    pagination {
      page
      limit
      total
      totalPages
    }
  }
}
