query Products(
  $category: String
  $page: Int
  $limit: Int
  $search: String
  $storeId: String
  $tag: String
  $petTypeIds: [String!]
  $brandIds: [String!]
  $minPrice: Int
  $maxPrice: Int
  $sortBy: String
  $sortOrder: String
  $sessionId: String
  $searchContext: SearchContextInput
) {
  products(
    category: $category
    page: $page
    limit: $limit
    search: $search
    storeId: $storeId
    tag: $tag
    petTypeIds: $petTypeIds
    brandIds: $brandIds
    minPrice: $minPrice
    maxPrice: $maxPrice
    sortBy: $sortBy
    sortOrder: $sortOrder
    sessionId: $sessionId
    searchContext: $searchContext
  ) {
    items {
      ...ProductCardFields
      store {
        id
        name
        slug
      }
    }
    pagination {
      page
      limit
      total
      totalPages
    }
  }
}
