fragment StorePromotionFields on PromotionType {
  id
  code
  name
  description
  type
  discountValue
  minPurchaseAmount
  maxDiscountAmount
  expiresAt
  scope
  storeId
  conditions
  autoApply
  priority
}

query ActiveStorePromotions($storeId: String!) {
  activeStorePromotions(storeId: $storeId) {
    ...StorePromotionFields
  }
}

query ActivePlatformPromotions {
  activePlatformPromotions {
    ...StorePromotionFields
  }
}

query ValidatePromotions($input: ValidatePromotionsInput!) {
  validatePromotions(input: $input) {
    items {
      id
      code
      name
      eligible
      ineligibilityReason
      discountAmount
      freeUnits
    }
  }
}
