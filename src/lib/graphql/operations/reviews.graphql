query ProductReviews($productId: String!) {
  productReviews(productId: $productId) {
    id
    productId
    rating
    comment
    status
    createdAt
    customerName
    images {
      id
      url
    }
    reply {
      id
      body
      createdAt
      updatedAt
    }
  }
}

query StoreReviews($storeId: String!) {
  storeReviews(storeId: $storeId) {
    id
    productId
    productName
    productSlug
    productImageUrl
    rating
    comment
    createdAt
    customerName
    images {
      id
      url
    }
    reply {
      id
      body
      createdAt
      updatedAt
    }
  }
}

query StoreReviewSummary($storeId: String!) {
  storeReviewSummary(storeId: $storeId) {
    averageRating
    totalCount
    productBreakdown {
      productId
      productName
      averageRating
      reviewCount
    }
  }
}

mutation CreateReview($input: CreateReviewInput!) {
  createReview(input: $input) {
    id
    productId
    rating
    comment
    status
    createdAt
    customerName
    images {
      id
      url
    }
  }
}

query CustomerReviewableItems {
  customerReviewableItems {
    orderId
    orderNumber
    orderItemId
    productId
    productName
    productSlug
    productImageUrl
    deliveredAt
    reviewDeadline
  }
}

query MyReviews($limit: Int, $offset: Int) {
  myReviews(limit: $limit, offset: $offset) {
    id
    productId
    productName
    productSlug
    productImageUrl
    orderId
    rating
    comment
    status
    createdAt
    images {
      id
      url
    }
  }
}
